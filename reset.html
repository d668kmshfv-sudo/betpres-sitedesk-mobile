<!doctype html>
<html lang="sk">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
 <meta name="theme-color" content="#f3f7fa">
 <title>Aktualizácia BETPRES SiteDesk</title>
 <style>
  *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#f3f7fa;color:#102a43;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(420px,100%);padding:28px;border:1px solid #d7e3ec;border-radius:24px;background:#fff;text-align:center;box-shadow:0 14px 38px rgba(8,47,91,.1)}img{width:170px;max-width:70%;height:auto}h1{margin:22px 0 8px;color:#062f63;font-size:1.45rem}p{margin:0;color:#687b8c;line-height:1.5}.spinner{width:34px;height:34px;margin:24px auto 0;border:4px solid #d7e3ec;border-top-color:#1682d4;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
 </style>
</head>
<body>
 <main class="card">
  <img src="assets/betpres-logo.png" alt="Betpres">
  <h1>Aktualizujem SiteDesk</h1>
  <p>Odstraňujem iba starú verziu aplikácie. Tvoje nastavenia a lokálne údaje zostanú zachované.</p>
  <div class="spinner" aria-label="Prebieha aktualizácia"></div>
 </main>
 <script>
  (async()=>{
   try{
    if("serviceWorker" in navigator){
     const registrations=await navigator.serviceWorker.getRegistrations();
     await Promise.all(registrations.map(registration=>registration.unregister()))
    }
    if("caches" in window){
     const keys=await caches.keys();
     await Promise.all(keys.filter(key=>key.startsWith("betpres-sitedesk-mobile-")).map(key=>caches.delete(key)))
    }
   }finally{
    const target=new URL("./",location.href);
    target.searchParams.set("refresh",`1.0.12-${Date.now()}`);
    setTimeout(()=>location.replace(target.href),250)
   }
  })()
 </script>
</body>
</html>
